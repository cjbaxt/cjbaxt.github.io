<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>cjbaxt</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, system-ui, sans-serif; background: #fff; color: #171717; -webkit-font-smoothing: antialiased; }
    .wrap { max-width: 560px; margin: 0 auto; padding: 4rem 1.5rem 3rem; }
    .eyebrow { font-size: 11px; color: #a3a3a3; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 2.5rem; }
    h1 { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 400; line-height: 1.3; margin-bottom: 0.5rem; }
    .sub { font-size: 15px; color: #737373; line-height: 1.6; margin-bottom: 3rem; }
    .list { border-top: 0.5px solid #e5e5e5; }
    a.item, div.item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 0; border-bottom: 0.5px solid #e5e5e5;
      text-decoration: none; color: inherit; gap: 1rem;
    }
    a.item:hover .title { text-decoration: underline; text-underline-offset: 3px; }
    .title { font-family: 'Playfair Display', serif; font-size: 16px; margin-bottom: 4px; }
    .desc { font-size: 13px; color: #737373; }
    .arrow { font-size: 16px; color: #d4d4d4; flex-shrink: 0; }
    div.item { opacity: 0.4; }
    .footer { font-size: 12px; color: #a3a3a3; margin-top: 3rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="eyebrow">cjbaxt.github.io</p>
    <h1>Hello. What are you doing here?</h1>
    <p class="sub">Perhaps you were looking for one of these.</p>

    <div class="list">
      <a class="item" href="https://cjbaxt.github.io/events-ledger">
        <div>
          <p class="title">Events Ledger</p>
          <p class="desc">A personal archive of live performances.</p>
        </div>
        <span class="arrow">→</span>
      </a>
      <div class="item">
        <div>
          <p class="title">Something else</p>
          <p class="desc">Coming eventually, probably.</p>
        </div>
        <span class="arrow">→</span>
      </div>
    </div>

    <p class="footer">claire baxter</p>
  </div>
</body>
</html>
